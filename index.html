<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plataforma Unificada · Línea Comunicaciones x Banco de Bogotá</title>
  
  <!-- Icono de marca (Isotipo) -->
  <link rel="icon" type="image/png" href="assets/logo-bdb-sintexto.png">
  
  <!-- Estilos Globales y variables de marca -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- CONTENEDOR DE PANTALLA DE LOGIN -->
  <div id="login-container"></div>

  <!-- CONTENEDOR DEL DASHBOARD PRINCIPAL (SHELL) -->
  <div id="app-container" class="hidden"></div>

  <!-- ════ LIBRERÍAS EXTERNAS (CDNs) ════ -->
  <!-- Chart.js para visualizaciones estadísticas -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- SheetJS (XLSX) para exportar tablas a Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ════ ESTRUCTURA MVC DE LA APLICACIÓN ════ -->
  <!-- 1. Configuración de credenciales y rutas de datos -->
  <script src="js/config.js"></script>
  
  <!-- 2. Modelos (M): Autenticación y Carga/Filtros de Datos -->
  <script src="js/models/authModel.js"></script>
  <script src="js/models/dashboardModel.js"></script>
  
  <!-- 3. Vistas (V): Login, Shell General y Tablero de Indicadores -->
  <script src="js/views/authView.js"></script>
  <script src="js/views/dashboardView.js"></script>
  <script src="js/views/indicatorsView.js"></script>
  
  <!-- 4. Controladores (C): Orquestador y enrutador -->
  <script src="js/controllers/appController.js"></script>
  
  <!-- 5. Bootstrapper / Inicialización -->
  <script src="js/app.js"></script>
</body>
</html>
